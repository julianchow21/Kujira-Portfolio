<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kujira Insurance (prototype)</title>
<meta name="theme-color" content="#131722">
<style>
*{box-sizing:border-box;margin:0;padding:0}
/* Design tokens lifted from Portfolio so this ports back cleanly. */
:root{
  --bg:#faf9f6;--bg2:#ffffff;--bg3:#f4f2ec;--bg4:#eae7dd;
  --border:#e7e3da;--border2:#d8d3c6;
  --text:#1f1d1a;--text2:#6b665e;--text3:#9a958b;
  --red:#b13838;--red2:#8f2c2c;--red-soft:#f7e6e6;--red-border:#e6c5c5;
  --green:#2f7d4f;--green-soft:#e6f1ea;--green-border:#bedcc9;
  --blue:#3a5e8c;--blue-soft:#e4ebf4;--blue-border:#c2d3e6;
  --amber:#9a6a14;--amber-soft:#f8efd6;--amber-border:#e7d3a0;
  --accent:#c15f3c;--accent2:#a64f30;--accent-soft:#f4e3da;--accent-border:#e6c5b4;
  --on-accent:#ffffff;
  --radius:8px;--radius-lg:12px;
  --glass:rgba(255,255,255,0.6);--glass-strong:rgba(255,255,255,0.78);
  --glass-border:rgba(0,0,0,0.06);--glass-hi:rgba(255,255,255,0.5);
  --glass-blur:12px;--glass-shadow:0 6px 18px rgba(60,50,40,0.10);
  --surface-solid:#ffffff;
  --glow1:rgba(193,95,60,0.06);--glow2:rgba(167,139,250,0.05);
}
html.dark{
  --bg:#131722;--bg2:#1e222d;--bg3:#2a2e39;--bg4:#363a45;
  --border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--text2:#999;--text3:#8a8f98;
  --red:#e24b4a;--red2:#c03333;--red-soft:#2a1515;--red-border:#3a2525;
  --green:#4CAF50;--green-soft:#1a2a1a;--green-border:#2a3a2a;
  --blue:#4a9eff;--blue-soft:#0d1f33;--blue-border:#1a2f43;
  --amber:#f59e0b;--amber-soft:#2a1f0a;--amber-border:#3a2f1a;
  --accent:#2dd4bf;--accent2:#14b8a6;--accent-soft:#0d2420;--accent-border:#1a3530;
  --on-accent:#0f0f0f;
  --glass:rgba(255,255,255,0.05);--glass-strong:rgba(255,255,255,0.07);
  --glass-border:rgba(255,255,255,0.11);--glass-hi:rgba(255,255,255,0.07);
  --glass-blur:14px;--glass-shadow:0 8px 22px rgba(0,0,0,0.35);
  --surface-solid:rgba(30,34,45,0.94);
  --glow1:rgba(45,212,191,0.16);--glow2:rgba(167,139,250,0.13);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;transition:background 0.2s,color 0.2s}
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(420px circle at 14% 2%,var(--glow1),transparent 60%),radial-gradient(460px circle at 92% 96%,var(--glow2),transparent 60%)}
a{color:var(--blue);text-decoration:none}

.topbar{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-bottom:1px solid var(--glass-border);padding:0 24px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100}
.logo{font-weight:800;margin-right:32px;display:flex;align-items:center;gap:10px;color:var(--text);cursor:pointer}
.logo-name{display:flex;flex-direction:column;line-height:1.1}
.logo-name span:first-child{font-size:14px;font-weight:800;letter-spacing:0.5px;background:linear-gradient(135deg,#2dd4bf,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-name span:last-child{font-size:12px;font-weight:400;color:var(--text3);opacity:0.85}
.nav{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:8px 14px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text2);transition:all 0.15s;font-family:inherit;white-space:nowrap}
.nav-btn:hover{background:var(--glass-strong);color:var(--text)}
.nav-btn.active{background:var(--glass-strong);color:var(--text);font-weight:500}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-left:12px;flex-shrink:0}
.ver-badge{font-size:11px;color:var(--text3);padding:4px 8px;border-radius:999px;border:1px solid var(--glass-border);background:var(--glass);white-space:nowrap}
.icon-btn{width:36px;height:36px;border-radius:var(--radius);border:1px solid var(--glass-border);background:var(--glass);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:15px}
.icon-btn:hover{background:var(--glass-strong);color:var(--text)}

.main{padding:24px;max-width:1100px;margin:0 auto;padding-bottom:80px}
.page{display:none}.page.active{display:block}
.page-title{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px}

.card{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:var(--radius-lg);box-shadow:var(--glass-shadow),inset 0 1px 0 var(--glass-hi);overflow:hidden;margin-bottom:16px}
.card-head{padding:14px 18px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-head h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-body{padding:18px}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--text3);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface-solid)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;background:var(--surface-solid);transition:background 0.12s ease}
tr:last-child td{border-bottom:none}
@media (hover:hover){tbody tr:hover td{background:color-mix(in srgb,var(--surface-solid) 93%,var(--text) 7%)}}
.num{font-variant-numeric:tabular-nums;text-align:right}
.tl{text-align:left}

table.holdings{font-size:13px}
table.holdings th{text-align:right}
table.holdings th.tl,table.holdings td.tl{text-align:left}
table.holdings td{font-variant-numeric:tabular-nums}
table.holdings td.cell-sym{font-weight:600}

/* ROW ACTIONS, real table-cell so the row-hover background covers it fully
   (the fix already applied in Portfolio). */
.row-actions{text-align:right;white-space:nowrap}
.row-actions .btn{vertical-align:middle}
.row-actions .btn + .btn{margin-left:4px}
.row-actions .btn-sm{padding:3px 8px}

.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--glass-border);background:var(--glass);cursor:pointer;font-size:13px;color:var(--text);transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--glass-strong)}
.btn:focus-visible{box-shadow:0 0 0 2px var(--accent);outline:none}
.btn-primary{background:var(--accent);color:var(--on-accent);border-color:var(--accent);font-weight:600}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-danger{background:var(--red-soft);color:var(--red);border-color:var(--red-border)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:rgba(255,255,255,0.07)}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
label.lbl{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;font-weight:600;cursor:pointer}
input.fi,select.fi,textarea.fi{padding:8px 11px;border:1px solid var(--glass-border);border-radius:var(--radius);background:var(--glass);color:var(--text);font-size:13px;font-family:inherit;width:100%}
input.fi:focus,select.fi:focus,textarea.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(45,212,191,0.4)}
textarea.fi{resize:vertical;min-height:70px}
.hint{font-size:12px;color:var(--text3);line-height:1.5}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;color:var(--text3)}
.empty-icon{width:48px;height:48px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:22px}
.empty-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:4px}
.empty-sub{font-size:12px;max-width:340px;line-height:1.6}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--glass-strong);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head h3{font-size:15px;font-weight:600}
.modal-body{padding:20px;overflow-y:auto;flex:1 1 auto}
.modal-foot{padding:14px 20px;border-top:1px solid var(--glass-border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;flex-shrink:0}

#toast-host{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:300;pointer-events:none}
.toast{background:var(--glass-strong);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);color:var(--text);padding:10px 14px;border-radius:var(--radius);font-size:13px;box-shadow:var(--glass-shadow);max-width:340px;pointer-events:auto}
.toast.error{border-color:var(--red-border);background:var(--red-soft);color:var(--red)}
.toast.success{border-color:var(--green-border);background:var(--green-soft);color:var(--green)}

.theme-toggle{display:inline-flex;border:1px solid var(--glass-border);border-radius:999px;overflow:hidden;background:var(--glass)}
.theme-toggle button{padding:7px 16px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.theme-toggle button.active{background:var(--accent);color:var(--on-accent)}

.buckets{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.bucket{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:var(--glass-shadow);padding:10px 12px}
.bucket-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;font-weight:600}
.bucket-amt{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}

.cov-bar{display:inline-block;width:80px;height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;vertical-align:middle;margin-right:8px}
.cov-bar span{display:block;height:100%;background:var(--accent)}
.cov-pill{display:inline-block;font-size:11px;font-weight:700;padding:1px 8px;border-radius:8px;border:1px solid transparent;white-space:nowrap}
.cov-pill.covered{color:var(--green);background:var(--green-soft);border-color:var(--green-border)}
.cov-pill.partial{color:var(--amber);background:var(--amber-soft);border-color:var(--amber-border)}
.cov-pill.gap{color:var(--red);background:var(--red-soft);border-color:var(--red-border)}
.cov-pill.na{color:var(--text3);background:var(--bg4);border-color:var(--border2)}
.stub{border:1px dashed var(--border2);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2)}
.stub input.fi{max-width:160px}
</style>
</head>
<body>
<div class="topbar">
  <a class="logo" onclick="showPage('insurance')"><div class="logo-name"><span>KUJIRA</span><span>Insurance</span></div></a>
  <nav class="nav">
    <button class="nav-btn active" data-tab="insurance" onclick="showPage('insurance')">Insurance</button>
    <button class="nav-btn" data-tab="settings" onclick="showPage('settings')">Settings</button>
  </nav>
  <div class="topbar-actions">
    <span class="ver-badge">v0.3 (3 Jul)</span>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">&#9680;</button>
  </div>
</div>

<div class="main">
  <section class="page active" id="page-insurance">
    <div style="margin-bottom:14px"><div class="page-title">Insurance</div><div class="page-sub">Standalone prototype for QA. Ports into Portfolio when verified.</div></div>
    <div id="insurance-root"></div>
  </section>
  <section class="page" id="page-settings">
    <div style="margin-bottom:14px"><div class="page-title">Settings</div><div class="page-sub">Coverage targets, appearance, and data.</div></div>
    <div id="settings-root"></div>
  </section>
</div>

<div class="overlay" id="entity-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="em-title">
    <div class="modal-head"><h3 id="em-title">Add policy</h3><button class="icon-btn" onclick="closeEntityModal()" aria-label="Close">&#10005;</button></div>
    <div class="modal-body" id="em-body"></div>
    <div class="modal-foot">
      <button class="btn btn-danger" id="em-delete" onclick="entityModalDelete()">Delete</button>
      <button class="btn" onclick="closeEntityModal()">Cancel</button>
      <button class="btn btn-primary" onclick="entityModalSave()">Save</button>
    </div>
  </div>
</div>
<div id="toast-host"></div>

<script>
/* Helpers (compact versions of Portfolio's, same signatures). */
function kjrEscape(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function kjrSafeNumber(raw){ if(raw===''||raw==null) return null; const n=Number(raw); return isFinite(n)?n:null; }
// Strip control characters (code < 32) without using control-char literals.
function kjrSafeString(s,max){ max=max||500; s=String(s==null?'':s); let out=''; for(let i=0;i<s.length;i++){ if(s.charCodeAt(i)>=32) out+=s[i]; } return out.slice(0,max); }
function kjrSafeId(id){ return typeof id==='string' && /^[a-zA-Z0-9_-]{1,64}$/.test(id); }
function uid(p){ return (p||'id')+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function fmt(n,opts){ opts=opts||{}; const dp=opts.dp==null?2:opts.dp; return 'S$'+(Number(n)||0).toLocaleString('en-SG',{minimumFractionDigits:dp,maximumFractionDigits:dp}); }
function toSGD(amt,ccy){ amt=Number(amt)||0; if(!ccy||ccy==='SGD') return amt; const R={USD:1.35,EUR:1.45,GBP:1.70,HKD:0.17,JPY:0.009,AUD:0.89,MYR:0.30}; return amt*(R[ccy]||1); }
function _isoDateSG(d){ d=d||new Date(); const z=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function fmtDateSG(iso){ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return iso; return d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getFullYear(); }
function showToast(msg,type){ const h=document.getElementById('toast-host'); if(!h) return; const t=document.createElement('div'); t.className='toast'+(type?(' '+type):''); t.textContent=msg; h.appendChild(t); setTimeout(()=>t.remove(),3200); }

/* Storage */
const LK='kjr-ins-db-v1';
function freshDB(){ return { insurance:[], income:[], trash:[], settings:{ coverageTargets:{}, theme:'dark' } }; }
function loadDB(){ try{ const r=localStorage.getItem(LK); if(r){ const d=JSON.parse(r); d.settings=Object.assign(freshDB().settings, d.settings||{}); return Object.assign(freshDB(), d); } }catch(e){} return freshDB(); }
let DB=loadDB();
function saveData(){ try{ localStorage.setItem(LK, JSON.stringify(DB)); }catch(e){ showToast('Save failed: '+e.message,'error'); } }
let _undo=[];
function pushUndo(){ try{ _undo.push(JSON.stringify(DB)); if(_undo.length>20)_undo.shift(); }catch(e){} }

/* Navigation + theme */
function showPage(tab){ document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active', p.id==='page-'+tab)); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab)); location.hash=tab; }
function applyTheme(){ document.documentElement.classList.toggle('dark', (DB.settings.theme||'dark')==='dark'); }
function toggleTheme(){ DB.settings.theme=(DB.settings.theme==='dark')?'light':'dark'; saveData(); applyTheme(); renderSettings(); }

/* SG insurers + schema (mirrors the drop-in spec). */
const SG_INSURERS=['AIA','Prudential','Great Eastern','Income','Singlife','Manulife','HSBC Life','Tokio Marine','China Taiping','Etiqa','FWD','Raffles Health Insurance','MSIG','AIG','Allianz','Chubb','Sompo','Liberty','QBE'];
const ENTITY_SCHEMAS={
  insurance:{
    title:'policy',
    fields:[
      { key:'insurer', label:'Insurer', type:'text', required:true, datalist:SG_INSURERS, placeholder:'AIA' },
      { key:'plan', label:'Plan name', type:'text', placeholder:'Living Care' },
      { key:'policyNo', label:'Policy number', type:'text' },
      { key:'type', label:'Type', type:'select', required:true, default:'Term Life',
        options:[['Term Life','Term Life'],['Whole Life','Whole Life'],['Endowment','Endowment'],['ILP','Investment-Linked'],['Critical Illness','Critical Illness'],['Hospitalisation','Hospitalisation (IP)'],['Personal Accident','Personal Accident'],['Disability Income','Disability Income'],['Long-term Care','CareShield / ElderShield'],['Mortgage','Mortgage (HPS / MRTA)'],['Car','Car'],['Home','Home / Fire'],['Travel','Travel'],['Other','Other']] },
      { key:'insured', label:'Life insured', type:'text', required:true, placeholder:'Self', default:'Self' },
      { key:'status', label:'Status', type:'select', default:'Active',
        options:[['Active','Active'],['Paid-up','Paid-up'],['Lapsed','Lapsed'],['Matured','Matured'],['Surrendered','Surrendered'],['Pending','Pending']] },
      { key:'coverDeath', label:'Death cover (SGD)', type:'number', step:'1', placeholder:'500000' },
      { key:'coverTPD', label:'TPD cover (SGD)', type:'number', step:'1' },
      { key:'coverCI', label:'Critical illness cover (SGD)', type:'number', step:'1' },
      { key:'coverHosp', label:'Hospital ward', type:'select', default:'',
        options:[['','n/a'],['B1','Public B1'],['A','Public A'],['Private','Private'],['As-charged','As-charged']] },
      { key:'coverIncomeMonthly', label:'Disability income (monthly benefit, SGD)', type:'number', step:'1' },
      { key:'coverLTCMonthly', label:'Long-term care (monthly payout, SGD)', type:'number', step:'1' },
      { key:'premium', label:'Premium (per payment)', type:'number', step:'0.01', placeholder:'1200' },
      { key:'premiumFreq', label:'Frequency', type:'select', default:'Annual',
        options:[['Monthly','Monthly'],['Quarterly','Quarterly'],['Semi-annual','Semi-annual'],['Annual','Annual'],['Single','Single premium']] },
      { key:'premiumMode', label:'Paid from', type:'select', default:'Cash',
        options:[['Cash','Cash / GIRO'],['Card','Credit card'],['MediSave','MediSave'],['CPF','CPF (DPS)'],['Other','Other']],
        hint:'MediSave / CPF premiums are excluded from your cash premium outlay.' },
      { key:'premiumDue', label:'Next premium / renewal date', type:'date' },
      { key:'cashValue', label:'Current cash / surrender value (SGD)', type:'number', step:'0.01', hint:'Counts toward net worth. Leave blank for term and health policies.' },
      { key:'maturityValue', label:'Projected maturity value (SGD)', type:'number', step:'1' },
      { key:'beneficiary', label:'Nominee(s)', type:'text' },
      { key:'docUrl', label:'Policy document link', type:'text', placeholder:'https://...' },
      { key:'notes', label:'Notes', type:'textarea' }
    ],
    defaults:{ type:'Term Life', status:'Active', insured:'Self', premiumFreq:'Annual', premiumMode:'Cash' },
    afterRead:(item)=>{ item.currency='SGD'; item.updatedAt=new Date().toISOString(); }
  }
};

/* Shared modal (compact Portfolio clone). */
function renderField(f, value){
  const v=value==null?(f.default==null?'':f.default):value;
  const safeV=kjrEscape(v);
  const required=f.required?' required':'';
  const hint=f.hint?'<div class="hint">'+kjrEscape(f.hint)+'</div>':'';
  const full=(f.type==='textarea')?' style="grid-column:1/-1"':'';
  let input='';
  if(f.type==='select'){
    const opts=(f.options||[]).map(o=>{ const a=Array.isArray(o)?o:[o,o]; return '<option value="'+kjrEscape(a[0])+'"'+(String(a[0])===String(v)?' selected':'')+'>'+kjrEscape(a[1])+'</option>'; }).join('');
    input='<select class="fi" data-fkey="'+f.key+'"'+required+'>'+opts+'</select>';
  } else if(f.type==='textarea'){
    input='<textarea class="fi" data-fkey="'+f.key+'" placeholder="'+kjrEscape(f.placeholder||'')+'">'+safeV+'</textarea>';
  } else {
    const step=f.step?' step="'+kjrEscape(f.step)+'"':'';
    const inputType=f.type==='number'?'number':(f.type==='date'?'date':'text');
    let listAttr='',listEl='';
    if(Array.isArray(f.datalist)&&f.datalist.length){ const id='dl-'+f.key; listAttr=' list="'+id+'"'; listEl='<datalist id="'+id+'">'+f.datalist.map(o=>'<option value="'+kjrEscape(o)+'"></option>').join('')+'</datalist>'; }
    input='<input class="fi" type="'+inputType+'" data-fkey="'+f.key+'"'+step+listAttr+' value="'+safeV+'" placeholder="'+kjrEscape(f.placeholder||'')+'"'+required+'>'+listEl;
  }
  return '<div class="form-group"'+full+'><label class="lbl">'+kjrEscape(f.label)+(f.required?' *':'')+'</label>'+input+hint+'</div>';
}
let _modalState=null;
function openEntityModal(table,id){
  const schema=ENTITY_SCHEMAS[table]; if(!schema) return;
  let item,isNew;
  if(id){ const found=(DB[table]||[]).find(x=>x.id===id); if(!found) return; item=JSON.parse(JSON.stringify(found)); isNew=false; }
  else { item=Object.assign({id:uid(table)}, schema.defaults||{}); isNew=true; }
  _modalState={table,item,isNew};
  document.getElementById('em-title').textContent=(isNew?'Add ':'Edit ')+schema.title;
  document.getElementById('em-body').innerHTML='<div class="form-grid">'+schema.fields.map(f=>renderField(f,item[f.key])).join('')+'</div>';
  document.getElementById('em-delete').style.display=isNew?'none':'';
  document.getElementById('entity-modal').classList.add('open');
}
function closeEntityModal(){ document.getElementById('entity-modal').classList.remove('open'); _modalState=null; }
function entityModalSave(){
  if(!_modalState) return;
  pushUndo();
  const table=_modalState.table, item=_modalState.item, isNew=_modalState.isNew;
  const schema=ENTITY_SCHEMAS[table];
  const body=document.getElementById('em-body');
  for(const f of schema.fields){
    const el=body.querySelector('[data-fkey="'+f.key+'"]'); if(!el) continue;
    const raw=el.value;
    if(f.type==='number') item[f.key]=kjrSafeNumber(raw);
    else if(f.type==='select'){ const allowed=(f.options||[]).map(o=>String(Array.isArray(o)?o[0]:o)); item[f.key]=allowed.includes(String(raw))?String(raw):(f.default||allowed[0]||''); }
    else if(f.type==='date') item[f.key]=/^\d{4}-\d{2}-\d{2}$/.test(raw)?raw:'';
    else if(f.type==='textarea') item[f.key]=kjrSafeString(String(raw).trim(),5000);
    else item[f.key]=kjrSafeString(String(raw).trim(),120);
  }
  for(const f of schema.fields){ if(!f.required) continue; const val=item[f.key]; if(val==null||val===''||(f.type==='number'&&!isFinite(val))){ showToast('Required: '+f.label,'error'); return; } }
  if(schema.afterRead) schema.afterRead(item);
  if(!kjrSafeId(item.id)) item.id=uid(table);
  if(isNew){ (DB[table]=DB[table]||[]).push(item); }
  else { const i=DB[table].findIndex(x=>x.id===item.id); if(i>=0) DB[table][i]=item; }
  saveData(); closeEntityModal(); renderAll(); showToast(isNew?'Added':'Saved','success');
}
function entityModalDelete(){
  if(!_modalState||_modalState.isNew) return;
  const table=_modalState.table, item=_modalState.item;
  if(!confirm('Move this policy to trash?')) return;
  pushUndo();
  const i=(DB[table]||[]).findIndex(x=>x.id===item.id);
  if(i>=0){ const removed=DB[table].splice(i,1)[0]; (DB.trash=DB.trash||[]).push({id:uid('tr'),table,ts:new Date().toISOString(),data:removed}); }
  saveData(); closeEntityModal(); renderAll(); showToast('Moved to trash','success');
}

/* Insurance helpers (from the spec). */
const PREMIUM_PER_YEAR={ Monthly:12, Quarterly:4, 'Semi-annual':2, Annual:1, Single:0 };
function annualPremium(p){ return (Number(p.premium)||0)*(PREMIUM_PER_YEAR[p.premiumFreq]??1); }
function cashPremiumPerYear(p){ return ['Cash','Card'].includes(p.premiumMode)?annualPremium(p):0; }
function insuranceCashValueSGD(){ return (DB.insurance||[]).filter(p=>p.status==='Active').reduce((s,p)=>s+toSGD(Number(p.cashValue)||0,p.currency||'SGD'),0); }

/* Coverage adequacy (from the spec). */
const COVERAGE_TARGETS_DEFAULT={ deathMult:10, tpdMult:10, ciMult:4, incomeProtectionPct:60, ltcMonthlyTarget:2500, hospTargetWard:'A', includeCareShieldBase:false };
function coverageTargets(){ return Object.assign({}, COVERAGE_TARGETS_DEFAULT, DB.settings.coverageTargets||{}); }
/* A cleared number field arrives as null. Storing it would zero the target and
   falsely mark the risk "covered", so drop the override and fall back to the
   default instead. */
function setCoverageTarget(key,val){ const next=Object.assign({}, DB.settings.coverageTargets); if(val==null||(typeof val==='number'&&!isFinite(val))) delete next[key]; else next[key]=val; DB.settings.coverageTargets=next; saveData(); renderInsurance(); renderSettings(); }
function annualIncomeSGD(){
  const inc=(DB.income||[]).filter(i=>i.date&&isFinite(Number(i.gross)));
  if(!inc.length) return 0;
  const cutoff=new Date(); cutoff.setFullYear(cutoff.getFullYear()-1);
  const cutISO=_isoDateSG(cutoff);
  let rows=inc.filter(i=>i.date>=cutISO);
  if(!rows.length) rows=inc;
  const byMonth={};
  rows.forEach(i=>{ const m=String(i.date).slice(0,7); byMonth[m]=(byMonth[m]||0)+(Number(i.gross)||0); });
  const months=Object.keys(byMonth).length||1;
  const total=Object.values(byMonth).reduce((s,v)=>s+v,0);
  return months>=12?total:(total/months)*12;
}
function _selfPolicies(){ return (DB.insurance||[]).filter(p=>p.status==='Active'&&(!p.insured||/^self$/i.test(p.insured))); }
function coverageAdequacy(){
  const t=coverageTargets();
  const annual=annualIncomeSGD();
  const monthly=annual/12;
  const pol=_selfPolicies();
  const sum=k=>pol.reduce((s,p)=>s+(Number(p[k])||0),0);
  const WARD_RANK={ '':0, B1:1, A:2, Private:3, 'As-charged':3 };
  const hasIP=pol.some(p=>p.type==='Hospitalisation'&&(WARD_RANK[p.coverHosp]||0)>=(WARD_RANK[t.hospTargetWard]||0));
  const ltcCurrent=sum('coverLTCMonthly')+(t.includeCareShieldBase?600:0);
  const risks=[
    { key:'death', label:'Death', unit:'sum', target:annual*t.deathMult, current:sum('coverDeath') },
    { key:'tpd', label:'Total disability', unit:'sum', target:annual*t.tpdMult, current:sum('coverTPD') },
    { key:'ci', label:'Critical illness', unit:'sum', target:annual*t.ciMult, current:sum('coverCI') },
    { key:'hosp', label:'Hospitalisation', unit:'bool', target:1, current:hasIP?1:0 },
    { key:'income', label:'Income protection', unit:'mo', target:monthly*t.incomeProtectionPct/100, current:sum('coverIncomeMonthly') },
    { key:'ltc', label:'Long-term care', unit:'mo', target:t.ltcMonthlyTarget, current:ltcCurrent }
  ].map(r=>{
    const assessed=r.unit==='bool'||r.key==='ltc'||annual>0;
    const ratio=r.target>0?Math.min(1,r.current/r.target):(r.current>0?1:0);
    const gap=Math.max(0,r.target-r.current);
    let status='na';
    if(assessed) status=r.unit==='bool'?(r.current?'covered':'gap'):ratio>=1?'covered':ratio>=0.5?'partial':'gap';
    return Object.assign(r,{ratio,gap,assessed,status});
  });
  const ratios=risks.filter(r=>r.assessed).map(r=>r.unit==='bool'?(r.current?1:0):r.ratio);
  const score=ratios.length?Math.round(ratios.reduce((s,v)=>s+v,0)/ratios.length*100):null;
  const weakest=risks.filter(r=>r.assessed&&r.status!=='covered').sort((a,b)=>a.ratio-b.ratio)[0]||null;
  return { annual, monthly, risks, score, weakest };
}

/* Render */
function setTestIncome(v){ const g=kjrSafeNumber(v); DB.income=g?[{id:'inc_test', date:_isoDateSG(new Date()), gross:g}]:[]; saveData(); renderInsurance(); }
function renderInsurance(){
  const el=document.getElementById('insurance-root'); if(!el) return;
  const list=(DB.insurance||[]).slice();
  const incomeNow=(DB.income&&DB.income[0]&&DB.income[0].gross)||'';
  const stub='<div class="stub">QA stub (dropped at fold-in): monthly gross income <input class="fi" type="number" step="100" placeholder="8000" value="'+incomeNow+'" onchange="setTestIncome(this.value)"><span>drives the adequacy targets. In Portfolio this reads your real income.</span></div>';
  const head='<div class="card"><div class="card-head"><h3>Policies</h3><button class="btn btn-primary btn-sm" onclick="openEntityModal(\'insurance\')">&#65291; Add policy</button></div>';
  if(!list.length){
    el.innerHTML=stub+head+'<div class="card-body"><div class="empty"><div class="empty-icon">&#128737;</div><div class="empty-title">No policies yet</div><div class="empty-sub">Track life, health, and general policies. Premiums, renewal dates, and any cash value feed the summary and the adequacy check.</div></div></div></div>'+renderCoverageAdequacy();
    return;
  }
  const active=list.filter(p=>p.status==='Active');
  const cashYr=active.reduce((s,p)=>s+cashPremiumPerYear(p),0);
  const nonCashYr=active.reduce((s,p)=>s+(annualPremium(p)-cashPremiumPerYear(p)),0);
  const cover=k=>active.reduce((s,p)=>s+(Number(p[k])||0),0);
  const summary='<div class="card-body"><div class="buckets">'+
    '<div class="bucket"><div class="bucket-label">Annual premium (cash)</div><div class="bucket-amt">'+fmt(cashYr,{dp:0})+'</div></div>'+
    '<div class="bucket"><div class="bucket-label">From MediSave / CPF</div><div class="bucket-amt">'+fmt(nonCashYr,{dp:0})+'</div></div>'+
    '<div class="bucket"><div class="bucket-label">Death cover</div><div class="bucket-amt">'+fmt(cover('coverDeath'),{dp:0})+'</div></div>'+
    '<div class="bucket"><div class="bucket-label">Cash value (net worth)</div><div class="bucket-amt">'+fmt(insuranceCashValueSGD(),{dp:0})+'</div></div>'+
  '</div>';
  const rows=list.sort((a,b)=>String(a.insurer||'').localeCompare(String(b.insurer||''))).map(p=>'<tr>'+
    '<td class="tl cell-sym">'+kjrEscape(p.insurer||'?')+'</td>'+
    '<td class="tl">'+kjrEscape(p.type||'')+'</td>'+
    '<td class="tl">'+kjrEscape(p.insured||'')+'</td>'+
    '<td class="tl">'+kjrEscape(p.status||'')+'</td>'+
    '<td class="num">'+(p.coverDeath?fmt(Number(p.coverDeath),{dp:0}):'&mdash;')+'</td>'+
    '<td class="num">'+(p.premium?fmt(annualPremium(p),{dp:0})+'/yr':'&mdash;')+'</td>'+
    '<td class="num">'+(p.premiumDue?fmtDateSG(p.premiumDue):'&mdash;')+'</td>'+
    '<td class="num">'+(p.cashValue?fmt(Number(p.cashValue),{dp:0}):'&mdash;')+'</td>'+
    '<td class="row-actions"><button class="btn btn-sm btn-ghost" onclick="openEntityModal(\'insurance\',\''+kjrEscape(p.id)+'\')">Edit</button></td>'+
  '</tr>').join('');
  const table='<div class="tbl-wrap"><table class="holdings"><thead><tr>'+
    '<th class="tl">Insurer</th><th class="tl">Type</th><th class="tl">Insured</th><th class="tl">Status</th><th>Death cover</th><th>Premium</th><th>Next due</th><th>Cash value</th><th></th>'+
  '</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  const today=new Date();
  const horizon=new Date(today.getTime()+90*864e5);
  const due=list.filter(p=>p.premiumDue&&new Date(p.premiumDue)>=today&&new Date(p.premiumDue)<=horizon).sort((a,b)=>String(a.premiumDue).localeCompare(String(b.premiumDue)));
  let renew='';
  if(due.length){
    renew='<div class="card"><div class="card-head"><h3>Upcoming premiums <span class="page-sub">next 90 days</span></h3></div><div class="card-body"><div class="tbl-wrap"><table class="holdings"><tbody>'+
      due.map(p=>'<tr><td class="tl cell-sym">'+kjrEscape(p.insurer||'?')+'</td><td class="tl">'+kjrEscape(p.plan||p.type||'')+'</td><td class="num">'+fmtDateSG(p.premiumDue)+' (in '+Math.max(0,Math.ceil((new Date(p.premiumDue)-today)/864e5))+'d)</td><td class="num">'+(p.premium?fmt(Number(p.premium),{dp:0}):'&mdash;')+'</td></tr>').join('')+
    '</tbody></table></div></div></div>';
  }
  el.innerHTML=stub+head+summary+table+renew+renderCoverageAdequacy();
}
function renderCoverageAdequacy(){
  const a=coverageAdequacy();
  if(a.annual<=0&&!_selfPolicies().length){
    return '<div class="card"><div class="card-head"><h3>Protection adequacy</h3></div><div class="card-body"><div class="empty"><div class="empty-icon">&#129517;</div><div class="empty-title">Add income and policies to see your gaps</div><div class="empty-sub">Targets are based on your annual income. Set the test income above and add your policies.</div></div></div></div>';
  }
  const t=coverageTargets();
  const cur=r=>r.unit==='bool'?(r.current?'Yes':'No'):fmt(r.current,{dp:0})+(r.unit==='mo'?'/mo':'');
  const tgt=r=>!r.assessed?'&mdash;':r.unit==='bool'?('Ward '+t.hospTargetWard+'+'):fmt(r.target,{dp:0})+(r.unit==='mo'?'/mo':'');
  const PILL={ covered:['covered','&#10003; Covered'], partial:['partial','&#9680; Partial'], gap:['gap','&#10005; Under-insured'], na:['na','&ndash; Not assessed'] };
  const rows=a.risks.map(r=>{
    const pill=PILL[r.status];
    const bar=(r.assessed&&r.unit!=='bool')?'<div class="cov-bar"><span style="width:'+Math.round(r.ratio*100)+'%"></span></div>':'';
    return '<tr><td class="tl">'+r.label+'</td><td class="num">'+cur(r)+'</td><td class="num">'+tgt(r)+'</td><td class="num">'+((r.assessed&&r.gap>0&&r.unit!=='bool')?fmt(r.gap,{dp:0})+(r.unit==='mo'?'/mo':''):'&mdash;')+'</td><td class="tl">'+bar+'<span class="cov-pill '+pill[0]+'">'+pill[1]+'</span></td></tr>';
  }).join('');
  const head=a.score==null?'Add income to score':'Protection score '+a.score+'%'+(a.weakest?' &middot; weakest: '+a.weakest.label:'');
  return '<div class="card"><div class="card-head"><h3>Protection adequacy</h3><span class="page-sub">'+head+'</span></div><div class="card-body">'+
    '<div class="tbl-wrap"><table class="holdings"><thead><tr><th class="tl">Risk</th><th>Current</th><th>Recommended</th><th>Gap</th><th class="tl">Status</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<p class="hint" style="margin-top:10px">Rule-of-thumb guide using income multiples (death and TPD 10x, CI 4x annual income, income protection 60% of monthly income). Not personalised financial advice, see a licensed adviser for a full needs analysis. Targets are editable in Settings.</p>'+
  '</div></div>';
}
function renderSettings(){
  const el=document.getElementById('settings-root'); if(!el) return;
  const t=coverageTargets();
  const num=(k,lbl,step)=>'<div class="form-group"><label class="lbl">'+lbl+'</label><input class="fi" type="number" step="'+(step||'1')+'" value="'+t[k]+'" onchange="setCoverageTarget(\''+k+'\', kjrSafeNumber(this.value))"></div>';
  el.innerHTML='<div class="card"><div class="card-head"><h3>Coverage targets</h3></div><div class="card-body">'+
    '<div class="form-grid">'+
      num('deathMult','Death (x annual income)')+
      num('tpdMult','TPD (x annual income)')+
      num('ciMult','Critical illness (x annual income)')+
      num('incomeProtectionPct','Income protection (% of monthly)')+
      num('ltcMonthlyTarget','Long-term care target (SGD/mo)')+
      '<div class="form-group"><label class="lbl">Hospitalisation target ward</label><select class="fi" onchange="setCoverageTarget(\'hospTargetWard\', this.value)">'+['B1','A','Private','As-charged'].map(w=>'<option value="'+w+'"'+(t.hospTargetWard===w?' selected':'')+'>'+w+'</option>').join('')+'</select></div>'+
    '</div>'+
    '<div class="form-group" style="margin-top:12px"><label class="lbl"><input type="checkbox" '+(t.includeCareShieldBase?'checked':'')+' onchange="setCoverageTarget(\'includeCareShieldBase\', this.checked)"> Include CareShield Life base (~600/mo) in LTC cover</label></div>'+
    '<p class="hint" style="margin-top:10px">Rule-of-thumb benchmarks, editable so the metric is transparent. Not personalised advice.</p>'+
  '</div></div>'+
  '<div class="card"><div class="card-head"><h3>Appearance &amp; data</h3></div><div class="card-body">'+
    '<div class="theme-toggle"><button class="'+((DB.settings.theme||'dark')==='light'?'active':'')+'" onclick="if(DB.settings.theme!==\'light\')toggleTheme()">Light</button><button class="'+((DB.settings.theme||'dark')==='dark'?'active':'')+'" onclick="if(DB.settings.theme!==\'dark\')toggleTheme()">Dark</button></div>'+
    '<div style="margin-top:14px"><button class="btn btn-danger" onclick="resetAll()">Reset all prototype data</button></div>'+
  '</div></div>';
}
function resetAll(){ if(!confirm('Reset all prototype data? This clears policies, test income, and settings.')) return; DB=freshDB(); saveData(); applyTheme(); renderAll(); showToast('Reset','success'); }
function renderAll(){ renderInsurance(); renderSettings(); }

/* Init */
applyTheme();
const _startTab=(location.hash||'#insurance').slice(1);
showPage(['insurance','settings'].includes(_startTab)?_startTab:'insurance');
renderAll();
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeEntityModal(); });
</script>
