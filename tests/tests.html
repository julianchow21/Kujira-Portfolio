<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Kujira Portfolio — core tests</title>
<style>
  body{font:14px/1.6 'SF Mono',ui-monospace,monospace;background:#0f0f0f;color:#e7e7e7;margin:0;padding:24px}
  h1{font-size:16px;margin:0 0 4px}
  .sub{color:#888;margin:0 0 18px}
  .ok{color:#4ade80}.fail{color:#f87171}
  .row{padding:2px 0}
  .group{margin-top:10px;color:#888;font-size:12px;padding:2px 0}
  #summary{margin-top:18px;padding:10px 14px;border-radius:8px;font-weight:700;display:inline-block}
  #summary.pass{background:#13351f;color:#4ade80}
  #summary.failed{background:#3a1414;color:#f87171}
</style>
</head>
<body>
<h1>Kujira Portfolio — core unit tests</h1>
<p class="sub">Zero build, zero framework. Loads ../kjr-core.js and asserts. Golden numbers trace to Docs/QA Report v1 (4 Jun).md.</p>
<div id="out"></div>
<div id="summary"></div>

<!-- The unit under test (same file index.html loads) -->
<script src="../kjr-core.js"></script>
<script>
(function(){
  const SCHEMA = 'kujira-portfolio';
  const out = document.getElementById('out');
  let pass = 0, fail = 0;

  function eq(a, b){ if (a !== b) throw new Error('expected ' + JSON.stringify(b) + ', got ' + JSON.stringify(a)); }
  function t(name, fn){
    let okFlag = true, msg = '';
    try { fn(); } catch (e){ okFlag = false; msg = e.message; }
    if (okFlag){ pass++; } else { fail++; }
    const div = document.createElement('div');
    div.className = 'row ' + (okFlag ? 'ok' : 'fail');
    div.textContent = (okFlag ? '  ok   ' : '  FAIL ') + name + (okFlag ? '' : '  — ' + msg);
    out.appendChild(div);
    (okFlag ? console.log : console.error)((okFlag ? 'ok   ' : 'FAIL ') + name + (okFlag ? '' : ' — ' + msg));
  }
  function group(label){
    const div = document.createElement('div');
    div.className = 'group';
    div.textContent = '── ' + label;
    out.appendChild(div);
    console.log('\n── ' + label);
  }

  /* ── looksPopulated ─────────────────────────────────────────────── */
  group('looksPopulated');
  t('empty DB is not populated',      () => eq(looksPopulated({ stocks: [], cash: [] }), false));
  t('null is not populated',          () => eq(looksPopulated(null), false));
  t('a cash row counts as populated', () => eq(looksPopulated({ cash: [{ id: 'a' }] }), true));
  t('a stock holding is populated',   () => eq(looksPopulated({ stocks: [{ id: 'x' }] }), true));
  t('only snapshots != populated',    () => eq(looksPopulated({ snapshots: [{ id: 's' }] }), false));

  /* ── seedDecision — the #Crit-1 data-loss guard ─────────────────── */
  group('seedDecision (#Crit-1)');
  t('matching schema -> ok (normal pull)',
    () => eq(seedDecision({ schema: SCHEMA }, { allowSeed: true }, SCHEMA), 'ok'));
  t('empty remote + allowSeed -> seed (safe first run)',
    () => eq(seedDecision({ schema: undefined, stocks: [], cash: [] }, { allowSeed: true }, SCHEMA), 'seed'));
  t('CRITICAL: populated remote under OLD schema -> refuse (no wipe)',
    () => eq(seedDecision({ schema: 'kujira-portfolio-v0', cash: [{ id: 'a', bal: 50000 }] }, { allowSeed: true }, SCHEMA), 'refuse'));
  t('CRITICAL: malformed remote with data arrays -> refuse',
    () => eq(seedDecision({ stocks: [{ id: 's' }] }, { allowSeed: true }, SCHEMA), 'refuse'));
  t('empty remote without allowSeed -> push-first',
    () => eq(seedDecision({}, { allowSeed: false }, SCHEMA), 'push-first'));

  /* ── Stock P&L — golden numbers from QA Report v1 (4 Jun) ──────── */
  group('computeStockPosition — P&L golden numbers');
  // QA assertion: open 30 @150, sell 10 @290 fee 5 → 20 left, avg 150, realised P&L 1,395
  const plResult = computeStockPosition(30, 150, [{ side: 'sell', shares: 10, price: 290, fees: 5 }]);
  t('P&L: realised P&L = 1395', () => eq(plResult.realisedPL, 1395));
  t('P&L: 20 shares remain after partial sell', () => eq(plResult.shares, 20));
  t('P&L: avg cost stays 150 after partial sell', () => eq(plResult.avgCost, 150));
  t('P&L: no position after full sell', () => {
    const r = computeStockPosition(10, 200, [{ side: 'sell', shares: 10, price: 250, fees: 0 }]);
    eq(r.shares, 0); eq(r.avgCost, 0);
  });

  /* ── CPF — golden numbers from QA Report v1 (4 Jun) ─────────────── */
  group('computeCpfContribution — age 36, gross 8000');
  // QA assertion: employee 1600, employer 1360, total 2960, net 6400, OA+SA+MA sums to total
  const cpf36 = computeCpfContribution(8000, 36);
  t('CPF age 36: employeeCPF = 1600',          () => eq(cpf36.employeeCPF, 1600));
  t('CPF age 36: employerCPF = 1360',          () => eq(cpf36.employerCPF, 1360));
  t('CPF age 36: total = 2960',                () => eq(cpf36.total, 2960));
  t('CPF age 36: net = 6400',                  () => eq(cpf36.net, 6400));
  t('CPF age 36: OA+SA+MA sums to total',      () => eq(cpf36.byAccount.OA + cpf36.byAccount.SA + cpf36.byAccount.MA, cpf36.total));

  group('computeCpfContribution — OW ceiling');
  // QA assertion: gross 12000 caps contribution wage at 8000, but net reflects full gross
  const cpfCeil = computeCpfContribution(12000, 36);
  t('CPF OW ceiling: wage capped at 8000',                    () => eq(cpfCeil.wage, 8000));
  t('CPF OW ceiling: net = gross - employeeCPF on capped wage', () => eq(cpfCeil.net, 10400));

  group('computeCpfContribution — age band differences');
  t('CPF age 60: lower rates than age 36', () => {
    const c60 = computeCpfContribution(8000, 60);
    if (c60.total >= cpf36.total) throw new Error('age-60 total ' + c60.total + ' should be < age-36 total ' + cpf36.total);
  });

  /* ── Paydays — golden numbers from QA Report v1 (4 Jun) ─────────── */
  group('getPayday — last working day (2026)');
  // QA assertion: Jan→30, Feb→27, Apr→30, May→29, Dec→31
  t('payday 2026-01: last working day = 30', () => eq(getPayday(2026, 1),  '2026-01-30'));
  t('payday 2026-02: last working day = 27', () => eq(getPayday(2026, 2),  '2026-02-27'));
  t('payday 2026-04: last working day = 30', () => eq(getPayday(2026, 4),  '2026-04-30'));
  t('payday 2026-05: last working day = 29', () => eq(getPayday(2026, 5),  '2026-05-29'));
  t('payday 2026-12: last working day = 31', () => eq(getPayday(2026, 12), '2026-12-31'));

  /* ── roundMoney + safeRatio (#Crit-2 helpers) ───────────────────── */
  group('roundMoney');
  t('roundMoney fixes the classic 0.1+0.2 float bug', () => eq(roundMoney(0.1 + 0.2), 0.3));
  t('roundMoney 2dp default',   () => eq(roundMoney(1234.567), 1234.57));
  t('roundMoney 4dp share price', () => eq(roundMoney(1.23456, 4), 1.2346));
  t('roundMoney null/NaN treated as 0', () => eq(roundMoney(null), 0));

  group('safeRatio');
  t('safeRatio returns null for zero denom',     () => eq(safeRatio(100, 0), null));
  t('safeRatio returns null for negative denom', () => eq(safeRatio(100, -50), null));
  t('safeRatio returns null for NaN denom',      () => eq(safeRatio(100, NaN), null));
  t('safeRatio P&L pct: 1395/4500 = 31',        () => eq(safeRatio(1395, 4500), 31));
  t('safeRatio negative P&L',                    () => eq(safeRatio(-500, 1000), -50));
  t('safeRatio custom scale (ratio not pct)',    () => eq(safeRatio(1, 4, 1), 0.25));

  /* ── rangePosition + vsBaseline + sectorClass (v1.2 helpers) ─────── */
  group('rangePosition');
  t('midpoint of band = 0.5',            () => eq(rangePosition(15, 10, 20), 0.5));
  t('at the low = 0',                    () => eq(rangePosition(10, 10, 20), 0));
  t('at the high = 1',                   () => eq(rangePosition(20, 10, 20), 1));
  t('tick below band clamps to 0',       () => eq(rangePosition(9.99, 10, 20), 0));
  t('tick above band clamps to 1',       () => eq(rangePosition(20.01, 10, 20), 1));
  t('zero-width band -> null',           () => eq(rangePosition(10, 10, 10), null));
  t('inverted band -> null',             () => eq(rangePosition(10, 20, 10), null));
  t('null price -> null',                () => eq(rangePosition(null, 10, 20), null));
  t('missing low -> null',               () => eq(rangePosition(15, null, 20), null));
  t('NaN high -> null',                  () => eq(rangePosition(15, 10, NaN), null));

  group('vsBaseline');
  t('10% above baseline',                () => eq(vsBaseline(110, 100), 0.1));
  t('20% below baseline',                () => eq(vsBaseline(80, 100), -0.2));
  t('equal to baseline = 0',             () => eq(vsBaseline(100, 100), 0));
  t('zero baseline -> null',             () => eq(vsBaseline(100, 0), null));
  t('negative baseline -> null',         () => eq(vsBaseline(100, -5), null));
  t('null price -> null',                () => eq(vsBaseline(null, 100), null));
  t('null baseline -> null',             () => eq(vsBaseline(100, null), null));

  group('sectorClass');
  t('Financials are cyclical',           () => eq(sectorClass('Financials'), 'cyclical'));
  t('Real Estate is cyclical',           () => eq(sectorClass('Real Estate'), 'cyclical'));
  t('Consumer Staples are defensive',    () => eq(sectorClass('Consumer Staples'), 'defensive'));
  t('Information Technology is sensitive', () => eq(sectorClass('Information Technology'), 'sensitive'));
  t('Energy is sensitive',               () => eq(sectorClass('Energy'), 'sensitive'));
  t('ETF / Fund -> null (unclassified)', () => eq(sectorClass('ETF / Fund'), null));
  t('unknown string -> null',            () => eq(sectorClass('Banking'), null));
  t('null -> null',                      () => eq(sectorClass(null), null));

  /* ── parseCSV ────────────────────────────────────────────────────── */
  group('parseCSV');
  t('simple two-row CSV', () => {
    const r = parseCSV('a,b,c\n1,2,3');
    return eq(r.length, 2) && eq(r[0][0], 'a') && eq(r[1][2], '3');
  });
  t('quoted field with comma inside', () => {
    const r = parseCSV('"hello, world",b\n1,2');
    return eq(r[0][0], 'hello, world');
  });
  t('doubled-quote escape', () => {
    const r = parseCSV('"say ""hi""",b');
    return eq(r[0][0], 'say "hi"');
  });
  t('CRLF line endings', () => {
    const r = parseCSV('a,b\r\n1,2\r\n');
    return eq(r.length, 2) && eq(r[1][1], '2');
  });
  t('trailing blank line ignored', () => {
    const r = parseCSV('a,b\n1,2\n');
    return eq(r.length, 2);
  });

  /* ── ibkrNum ────────────────────────────────────────────────────── */
  group('ibkrNum');
  t('"1,234.56" parses to 1234.56', () => eq(ibkrNum('1,234.56'), 1234.56));
  t('plain "175.5" parses correctly', () => eq(ibkrNum('175.5'), 175.5));
  t('negative "-7.52" parses correctly', () => eq(ibkrNum('-7.52'), -7.52));
  t('junk string returns null', () => eq(ibkrNum('n/a'), null));
  t('null input returns null', () => eq(ibkrNum(null), null));
  t('empty string returns null', () => eq(ibkrNum(''), null));

  /* ── ibkrExtractTrades ──────────────────────────────────────────── */
  group('ibkrExtractTrades');
  const IBKR_HEADER = 'Trades,Header,DataDiscriminator,Asset Category,Currency,Symbol,Date/Time,Quantity,T. Price,C. Price,Proceeds,Comm/Fee,Basis,Realized P/L,MTM P/L,Code';
  const ibkrBuy  = 'Trades,Data,Order,Stocks,USD,AAPL,"2024-01-15, 10:30:00",100,175.5,176,17550,-7.52,-17557.52,0,50,';
  const ibkrSell = 'Trades,Data,Order,Stocks,USD,AAPL,"2024-03-20, 14:00:00",-50,190,190.5,-9500,-6.5,8768.76,726.24,-25,';
  const ibkrClosed = 'Trades,Data,ClosedLot,Stocks,USD,AAPL,"2024-03-20, 14:00:00",-50,190,190.5,-9500,-6.5,8768.76,726.24,-25,';
  const ibkrOption = 'Trades,Data,Order,Equity and Index Options,USD,AAPL 20240315 170.0 C,"2024-01-15, 09:00:00",1,2.5,2.6,250,-1.05,-251.05,0,10,';
  const ibkrSubTot = 'Trades,SubTotal,,Stocks,USD,AAPL,,,,,17550,-7.52,,0,50,';
  const ibkrTotal  = 'Trades,Total,,Stocks,,,,,,,17550,-7.52,,0,50,';

  t('extracts a buy trade correctly', () => {
    const csv = IBKR_HEADER + '\n' + ibkrBuy;
    const { trades } = ibkrExtractTrades(parseCSV(csv));
    return eq(trades.length, 1) && eq(trades[0].side, 'buy') &&
           eq(trades[0].symbol, 'AAPL') && eq(trades[0].shares, 100) &&
           eq(trades[0].price, 175.5) && eq(trades[0].fees, 7.52) &&
           eq(trades[0].date, '2024-01-15');
  });
  t('extracts a sell trade correctly', () => {
    const csv = IBKR_HEADER + '\n' + ibkrSell;
    const { trades } = ibkrExtractTrades(parseCSV(csv));
    return eq(trades.length, 1) && eq(trades[0].side, 'sell') && eq(trades[0].shares, 50);
  });
  t('ClosedLot rows are skipped (no double-count)', () => {
    const csv = IBKR_HEADER + '\n' + ibkrBuy + '\n' + ibkrClosed;
    const { trades, skipped } = ibkrExtractTrades(parseCSV(csv));
    return eq(trades.length, 1) && eq(skipped, 1);
  });
  t('Options rows are skipped', () => {
    const csv = IBKR_HEADER + '\n' + ibkrBuy + '\n' + ibkrOption;
    const { trades } = ibkrExtractTrades(parseCSV(csv));
    return eq(trades.length, 1);
  });
  t('SubTotal and Total rows are skipped', () => {
    const csv = IBKR_HEADER + '\n' + ibkrBuy + '\n' + ibkrSubTot + '\n' + ibkrTotal;
    const { trades } = ibkrExtractTrades(parseCSV(csv));
    return eq(trades.length, 1);
  });
  t('header-order independence: columns in reversed order still parse', () => {
    // Swap columns to prove we use header-map not fixed positions
    const hdr = 'Trades,Header,Comm/Fee,T. Price,Quantity,Date/Time,Symbol,Currency,Asset Category,DataDiscriminator,junk1,junk2,junk3,junk4,junk5,junk6';
    const row = 'Trades,Data,-7.52,175.5,100,"2024-01-15, 10:30:00",AAPL,USD,Stocks,Order,,,,,,';
    const { trades } = ibkrExtractTrades(parseCSV(hdr + '\n' + row));
    return eq(trades.length, 1) && eq(trades[0].price, 175.5) && eq(trades[0].symbol, 'AAPL');
  });
  t('thousands-comma quantity "1,000" parses to 1000 shares', () => {
    const hdr = 'Trades,Header,DataDiscriminator,Asset Category,Currency,Symbol,Date/Time,Quantity,T. Price,C. Price,Proceeds,Comm/Fee,Basis,Realized P/L,MTM P/L,Code';
    const row = 'Trades,Data,Order,Stocks,USD,AAPL,"2024-01-15, 10:30:00","1,000",175.5,176,17550,-7.52,-17557.52,0,50,';
    const { trades } = ibkrExtractTrades(parseCSV(hdr + '\n' + row));
    return eq(trades.length, 1) && eq(trades[0].shares, 1000);
  });

  /* ── ibkrMatchTrades ────────────────────────────────────────────── */
  group('ibkrMatchTrades');
  const stocks = [{ id:'s1', symbol:'AAPL', market:'US', currency:'USD' }];
  const existingTxns = [{ id:'t1', stockId:'s1', date:'2024-01-15', side:'buy', shares:100, price:175.5 }];
  const parsed = [
    { symbol:'AAPL', date:'2024-01-15', side:'buy',  shares:100, price:175.5, fees:7.52 },  // dup
    { symbol:'AAPL', date:'2024-03-20', side:'sell', shares:50,  price:190,   fees:6.5 },   // new
    { symbol:'NVDA', date:'2024-02-01', side:'buy',  shares:10,  price:600,   fees:5 }      // new-stock
  ];
  const matched = ibkrMatchTrades(parsed, stocks, existingTxns);
  t('dup detection: exact match returns dup', () => eq(matched[0].status, 'dup'));
  t('new trade returns new', () => eq(matched[1].status, 'new') && eq(matched[1].stockId, 's1'));
  t('unknown symbol returns new-stock', () => eq(matched[2].status, 'new-stock') && eq(matched[2].stockId, null));
  t('new-stock infers market from currency (USD → US)', () => eq(matched[2].market, 'US'));
  t('new-stock SGD currency infers SGX', () => {
    const r = ibkrMatchTrades([{ symbol:'D05', date:'2024-01-01', side:'buy', shares:100, price:30, currency:'SGD' }], [], []);
    return eq(r[0].market, 'SGX');
  });
  t('near-match price (within 0.001) is dup', () => {
    const r = ibkrMatchTrades(
      [{ symbol:'AAPL', date:'2024-01-15', side:'buy', shares:100, price:175.5005 }],
      stocks, existingTxns
    );
    return eq(r[0].status, 'dup');
  });
  t('different date is not dup', () => {
    const r = ibkrMatchTrades(
      [{ symbol:'AAPL', date:'2024-01-16', side:'buy', shares:100, price:175.5 }],
      stocks, existingTxns
    );
    return eq(r[0].status, 'new');
  });

  /* ── Summary ─────────────────────────────────────────────────────── */
  const sum = document.getElementById('summary');
  sum.textContent = pass + ' passed, ' + fail + ' failed';
  sum.className = fail ? 'failed' : 'pass';
  window.__TEST_RESULT = { pass: pass, fail: fail };
  console.log('\n' + pass + ' passed, ' + fail + ' failed');
})();
</script>
</body>
</html>
