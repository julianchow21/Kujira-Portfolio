<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kujira Portfolio</title>
<!-- The app moved into Portfolio/ when this repo was restructured into two
     app folders (Portfolio/ + Trading/). This stub keeps the old root URL
     working: old bookmarks and the previously installed PWA land here and
     get forwarded. The sw.js beside this file is a kill switch that
     unregisters the old root-scoped service worker and clears its caches. -->
<meta http-equiv="refresh" content="0; url=Portfolio/">
<style>
  body{font-family:-apple-system,system-ui,sans-serif;background:#0f0f0f;color:#e7e7e7;
       display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
  a{color:#2dd4bf}
</style>
</head>
<body>
<p>Kujira Portfolio has moved. <a href="Portfolio/">Continue to the app</a></p>
<script>
  // Belt and braces: meta refresh handles it, this covers anything that blocks it.
  window.location.replace('Portfolio/');
</script>
</body>
</html>
